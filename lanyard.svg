<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="200" height="300" viewBox="0 0 200 300">
  <defs>
    <style>
      @keyframes dropIn {
        from { transform: translateY(-250px); opacity:0; }
        to   { transform: translateY(0); opacity:1; }
      }
      @keyframes swing {
        0%   { transform: rotate(-10deg); }
        50%  { transform: rotate(10deg); }
        100% { transform: rotate(-10deg); }
      }
      @keyframes shine {
        0%   { transform: translateX(-80px); opacity:0; }
        30%  { opacity:0.5; }
        70%  { opacity:0.5; }
        100% { transform: translateX(80px); opacity:0; }
      }
      @keyframes ringPulse {
        0%,100%{ opacity:0.5; }
        50%    { opacity:1; }
      }
      .drop  { animation: dropIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.3s both; }
      .swing { transform-origin: 100px 0px; animation: swing 3s ease-in-out 1.2s infinite; }
      .shine { animation: shine 3s linear 2s infinite; }
      .ring  { animation: ringPulse 2s ease-in-out infinite; }
    </style>

    <clipPath id="avatarClip">
      <circle cx="100" cy="148" r="36"/>
    </clipPath>
    <clipPath id="cardClip">
      <rect x="30" y="82" width="140" height="188" rx="12"/>
    </clipPath>

    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:white;stop-opacity:0"/>
      <stop offset="50%"  style="stop-color:white;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#FF6B35" flood-opacity="0.4"/>
    </filter>
  </defs>

  <g class="drop">
    <g class="swing">
      <!-- Strap -->
      <line x1="100" y1="0"  x2="78"  y2="82" stroke="#FF6B35" stroke-width="7" stroke-linecap="round"/>
      <line x1="100" y1="0"  x2="122" y2="82" stroke="#FF6B35" stroke-width="7" stroke-linecap="round"/>
      <!-- Strap text -->
      <text font-family="monospace" font-size="5" fill="#ff9a6c" opacity="0.6" transform="rotate(-20,100,40)">
        <textPath startOffset="0">ZEN4TRIX · AI · AUTO · ZEN4TRIX · AI</textPath>
      </text>

      <!-- Clasp -->
      <rect x="86" y="74" width="28" height="12" rx="4" fill="#777" stroke="#999" stroke-width="0.5"/>
      <rect x="94" y="70" width="12" height="8"  rx="2" fill="#888"/>

      <!-- Card -->
      <g filter="url(#shadow)">
        <rect x="30" y="82" width="140" height="188" rx="12" fill="url(#cardBg)" stroke="#FF6B35" stroke-width="1.2"/>
      </g>

      <!-- Shine sweep -->
      <g clip-path="url(#cardClip)">
        <rect x="30" y="82" width="50" height="188" fill="url(#shineGrad)" class="shine"/>
      </g>

      <!-- Avatar glow ring -->
      <circle cx="100" cy="148" r="40" fill="none" stroke="#FF6B35" stroke-width="2" class="ring"/>
      <circle cx="100" cy="148" r="37" fill="#0d1117"/>

      <!-- Avatar image -->
      <image href="https://github.com/user-attachments/assets/e8fd65f9-9153-4650-967d-226658701c36"
        x="64" y="112" width="72" height="72"
        clip-path="url(#avatarClip)"
        preserveAspectRatio="xMidYMid slice"/>

      <!-- Name -->
      <text x="100" y="202" font-family="'Courier New',monospace" font-weight="700" font-size="12" fill="#e6edf3" text-anchor="middle">Santhosh Shandeep</text>

      <!-- Role -->
      <text x="100" y="218" font-family="monospace" font-size="9" fill="#FF6B35" text-anchor="middle">AI Automation Expert</text>

      <!-- Handle -->
      <text x="100" y="232" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">@santhoshshandeep</text>

      <!-- Divider -->
      <line x1="46" y1="240" x2="154" y2="240" stroke="#30363d" stroke-width="0.5"/>

      <!-- Barcode -->
      <g fill="#e6edf3" opacity="0.45">
        <rect x="48"  y="248" width="2" height="14"/><rect x="52"  y="248" width="1" height="14"/>
        <rect x="55"  y="248" width="3" height="14"/><rect x="60"  y="248" width="1" height="14"/>
        <rect x="63"  y="248" width="2" height="14"/><rect x="67"  y="248" width="1" height="14"/>
        <rect x="70"  y="248" width="3" height="14"/><rect x="75"  y="248" width="1" height="14"/>
        <rect x="78"  y="248" width="2" height="14"/><rect x="82"  y="248" width="1" height="14"/>
        <rect x="85"  y="248" width="3" height="14"/><rect x="90"  y="248" width="1" height="14"/>
        <rect x="93"  y="248" width="2" height="14"/><rect x="97"  y="248" width="1" height="14"/>
        <rect x="100" y="248" width="3" height="14"/><rect x="105" y="248" width="2" height="14"/>
        <rect x="109" y="248" width="1" height="14"/><rect x="112" y="248" width="2" height="14"/>
        <rect x="116" y="248" width="3" height="14"/><rect x="121" y="248" width="1" height="14"/>
        <rect x="124" y="248" width="2" height="14"/><rect x="128" y="248" width="1" height="14"/>
        <rect x="131" y="248" width="3" height="14"/><rect x="136" y="248" width="2" height="14"/>
        <rect x="140" y="248" width="1" height="14"/><rect x="143" y="248" width="2" height="14"/>
        <rect x="147" y="248" width="3" height="14"/>
      </g>
      <text x="100" y="274" font-family="monospace" font-size="6.5" fill="#8b949e" text-anchor="middle">ZEN4TRIX-AI-2024</text>
    </g>
  </g>
</svg>
