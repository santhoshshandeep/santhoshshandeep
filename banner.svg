<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="400" viewBox="0 0 1280 400">
  <defs>
    <style>
      .terminal-text {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #56d364;
      }
      @keyframes typing1 {
        from { clip-path: inset(0 100% 0 0); }
        to   { clip-path: inset(0 0% 0 0); }
      }
      .type-anim { animation: typing1 2s steps(30,end) 0.5s both; }

      @keyframes nameIn {
        from { opacity:0; transform: translateY(20px); }
        to   { opacity:1; transform: translateY(0); }
      }
      .name-text { animation: nameIn 1s ease 2.8s both; }

      @keyframes role1anim { 0%{opacity:1} 30%{opacity:1} 33%{opacity:0} 96%{opacity:0} 100%{opacity:1} }
      @keyframes role2anim { 0%{opacity:0} 30%{opacity:0} 33%{opacity:1} 63%{opacity:1} 66%{opacity:0} 100%{opacity:0} }
      @keyframes role3anim { 0%{opacity:0} 63%{opacity:0} 66%{opacity:1} 96%{opacity:1} 100%{opacity:0} }
      .role1 { animation: role1anim 9s ease 3.5s infinite; opacity:1; }
      .role2 { animation: role2anim 9s ease 3.5s infinite; opacity:0; }
      .role3 { animation: role3anim 9s ease 3.5s infinite; opacity:0; }

      @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      .fade1{animation:fadeUp 0.5s ease 5s both}
      .fade2{animation:fadeUp 0.5s ease 5.2s both}
      .fade3{animation:fadeUp 0.5s ease 5.4s both}
      .fade4{animation:fadeUp 0.5s ease 5.6s both}
      .fade5{animation:fadeUp 0.5s ease 5.8s both}
      .fade6{animation:fadeUp 0.5s ease 6s both}
      .fade7{animation:fadeUp 0.5s ease 6.2s both}

      @keyframes barGrow { from{width:0} to{} }
      .bar1{animation:barGrow 1.2s ease 6.5s both}
      .bar2{animation:barGrow 1.2s ease 6.7s both}
      .bar3{animation:barGrow 1.2s ease 6.9s both}

      @keyframes scan {
        0%   { transform: translateY(0px); opacity: 0.8; }
        100% { transform: translateY(320px); opacity: 0; }
      }
      .scanner { animation: scan 3.5s linear 1s infinite; }

      @keyframes holoIn {
        0%  { opacity:0; filter:brightness(3) blur(6px); }
        50% { opacity:0.7; filter:brightness(1.5) blur(1px); }
        100%{ opacity:1; filter:brightness(1) blur(0); }
      }
      .char { animation: holoIn 2s ease 0.5s both; }

      @keyframes ringPulse {
        0%,100%{ r:152; opacity:0.4; }
        50%    { r:158; opacity:0.8; }
      }
      .ring { animation: ringPulse 3s ease-in-out infinite; }

      @keyframes blink { 50%{opacity:0} }
      .cursor { animation: blink 0.8s step-end infinite; }

      @keyframes float {
        0%  { transform:translateY(0) scale(1); opacity:0.5; }
        100%{ transform:translateY(-380px) scale(0); opacity:0; }
      }
      .dot1{animation:float 7s linear 0s infinite}
      .dot2{animation:float 9s linear 2s infinite}
      .dot3{animation:float 6s linear 1s infinite}
      .dot4{animation:float 8s linear 3s infinite}
      .dot5{animation:float 10s linear 0.5s infinite}

      @keyframes underlineGrow { from{width:0} to{width:380px} }
      .underline { animation: underlineGrow 0.8s ease 3.5s both; }
    </style>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="60%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35">
        <animate attributeName="offset" values="0;0.3;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#ff9a6c"/>
      <stop offset="100%" style="stop-color:#FF6B35">
        <animate attributeName="offset" values="1;0.7;1" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#FF6B35;stop-opacity:0"/>
      <stop offset="50%"  style="stop-color:#FF6B35;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0"/>
    </linearGradient>

    <clipPath id="charClip">
      <circle cx="1080" cy="200" r="150"/>
    </clipPath>
    <clipPath id="scanClip">
      <circle cx="1080" cy="200" r="150"/>
    </clipPath>

    <filter id="nameGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#FF6B35" stroke-width="0.5">
    <line x1="0" y1="80"  x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
  </g>

  <!-- Floating particles -->
  <circle class="dot1" cx="60"  cy="370" r="2"   fill="#FF6B35"/>
  <circle class="dot2" cx="180" cy="350" r="1.5" fill="#ff9a6c"/>
  <circle class="dot3" cx="300" cy="380" r="1"   fill="#FF6B35"/>
  <circle class="dot4" cx="500" cy="360" r="2"   fill="#ff9a6c"/>
  <circle class="dot5" cx="650" cy="375" r="1.5" fill="#FF6B35"/>

  <!-- Terminal bar -->
  <rect x="40" y="35" width="14" height="14" rx="3" fill="#ff5f57"/>
  <rect x="60" y="35" width="14" height="14" rx="3" fill="#ffbd2e"/>
  <rect x="80" y="35" width="14" height="14" rx="3" fill="#28c840"/>
  <rect x="104" y="31" width="540" height="22" rx="6" fill="#161b22" opacity="0.9"/>
  <text x="116" y="46" class="terminal-text type-anim">user@zen4trix:~$ cat profile.md</text>
  <rect class="cursor" x="470" y="34" width="7" height="13" rx="1" fill="#56d364"/>

  <!-- NAME -->
  <text x="40" y="112" class="name-text"
    font-family="'Courier New',monospace" font-weight="700" font-size="44"
    fill="url(#nameGrad)" filter="url(#nameGlow)">Santhosh Shandeep</text>

  <!-- Underline -->
  <rect class="underline" x="40" y="120" height="3" rx="2" fill="#FF6B35"/>

  <!-- Cycling roles -->
  <text x="40" y="152" class="role1" font-family="'Courier New',monospace" font-size="17" fill="#FF6B35">⚡ AI Automation Expert</text>
  <text x="40" y="152" class="role2" font-family="'Courier New',monospace" font-size="17" fill="#FF6B35">🌐 Full-Stack Web Developer</text>
  <text x="40" y="152" class="role3" font-family="'Courier New',monospace" font-size="17" fill="#FF6B35">🚀 Founder @ Zen4trix</text>

  <!-- Tagline -->
  <text x="40" y="178" class="fade1" font-family="'Courier New',monospace" font-size="12" fill="#8b949e">"Building AI solutions for Tamil Nadu, one bot at a time."</text>

  <!-- Tech Pills -->
  <g class="fade2">
    <rect x="40"  y="194" width="105" height="24" rx="12" fill="#1a1f2e" stroke="#FF6B35" stroke-width="1"/>
    <text x="92"  y="210" font-family="monospace" font-size="11" fill="#FF6B35" text-anchor="middle">🤖 Claude AI</text>
  </g>
  <g class="fade3">
    <rect x="152" y="194" width="105" height="24" rx="12" fill="#1a1f2e" stroke="#25D366" stroke-width="1"/>
    <text x="204" y="210" font-family="monospace" font-size="11" fill="#25D366" text-anchor="middle">💬 WhatsApp</text>
  </g>
  <g class="fade4">
    <rect x="264" y="194" width="85"  height="24" rx="12" fill="#1a1f2e" stroke="#61DAFB" stroke-width="1"/>
    <text x="306" y="210" font-family="monospace" font-size="11" fill="#61DAFB" text-anchor="middle">⚛️ React</text>
  </g>
  <g class="fade5">
    <rect x="356" y="194" width="80"  height="24" rx="12" fill="#1a1f2e" stroke="#3776AB" stroke-width="1"/>
    <text x="396" y="210" font-family="monospace" font-size="11" fill="#3776AB" text-anchor="middle">🐍 Python</text>
  </g>
  <g class="fade6">
    <rect x="443" y="194" width="60"  height="24" rx="12" fill="#1a1f2e" stroke="#EA4B71" stroke-width="1"/>
    <text x="473" y="210" font-family="monospace" font-size="11" fill="#EA4B71" text-anchor="middle">⚡ n8n</text>
  </g>

  <!-- Skill bars -->
  <g class="fade7">
    <text x="40" y="258" font-family="monospace" font-size="11" fill="#8b949e">AI Automation</text>
    <rect x="148" y="247" width="200" height="9" rx="4" fill="#21262d"/>
    <rect x="148" y="247" width="190" height="9" rx="4" fill="#FF6B35" class="bar1"/>
    <text x="354"  y="257" font-family="monospace" font-size="10" fill="#FF6B35">95%</text>

    <text x="40" y="280" font-family="monospace" font-size="11" fill="#8b949e">WhatsApp Bots</text>
    <rect x="148" y="269" width="200" height="9" rx="4" fill="#21262d"/>
    <rect x="148" y="269" width="200" height="9" rx="4" fill="#FF6B35" class="bar2"/>
    <text x="354"  y="279" font-family="monospace" font-size="10" fill="#FF6B35">100%</text>

    <text x="40" y="302" font-family="monospace" font-size="11" fill="#8b949e">Web Dev</text>
    <rect x="148" y="291" width="200" height="9" rx="4" fill="#21262d"/>
    <rect x="148" y="291" width="170" height="9" rx="4" fill="#FF6B35" class="bar3"/>
    <text x="354"  y="301" font-family="monospace" font-size="10" fill="#FF6B35">85%</text>
  </g>

  <!-- MSME + Location badges -->
  <g style="animation:fadeUp 0.5s ease 7s both">
    <rect x="40"  y="322" width="210" height="22" rx="6" fill="#0d1117" stroke="#FF6B35" stroke-width="0.5"/>
    <text x="50"  y="337" font-family="monospace" font-size="10" fill="#FF6B35">✅ MSME: UDYAM-TN-28-0213819</text>
    <rect x="258" y="322" width="155" height="22" rx="6" fill="#0d1117" stroke="#56d364" stroke-width="0.5"/>
    <text x="268" y="337" font-family="monospace" font-size="10" fill="#56d364">📍 Tirupur, Tamil Nadu</text>
  </g>

  <!-- RIGHT — Character with GitHub URL -->
  <!-- Outer glow ring -->
  <circle class="ring" cx="1080" cy="200" r="152" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>
  <circle cx="1080" cy="200" r="148" fill="#0d1117" opacity="0.2"/>

  <!-- Character image using GitHub URL -->
  <image href="./avatar.png"
    x="930" y="50" width="300" height="300"
    class="char" preserveAspectRatio="xMidYMid slice"
    clip-path="url(#charClip)"/>

  <!-- Hologram scanner over character -->
  <g clip-path="url(#scanClip)">
    <rect x="930" y="50" width="300" height="6" fill="url(#scanGrad)" class="scanner"/>
  </g>

  <!-- Border -->
  <rect width="1280" height="400" rx="16" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.35"/>

  <!-- Corner accents -->
  <path d="M16,42 L16,16 L42,16"   fill="none" stroke="#FF6B35" stroke-width="2"/>
  <path d="M1238,16 L1264,16 L1264,42"  fill="none" stroke="#FF6B35" stroke-width="2"/>
  <path d="M16,358 L16,384 L42,384" fill="none" stroke="#FF6B35" stroke-width="2"/>
  <path d="M1238,384 L1264,384 L1264,358" fill="none" stroke="#FF6B35" stroke-width="2"/>
</svg>
